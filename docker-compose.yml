services:
  terminia-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEMOCLAW_API_URL=http://terminia-api:3100
        - NEXT_PUBLIC_SUPABASE_URL=https://supabase-terminia.pezserv.org
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpYXQiOjE3NzQ3NDA3NDAsImV4cCI6MTg5MzQ1NjAwMCwicm9sZSI6ImFub24iLCJpc3MiOiJzdXBhYmFzZSJ9.3rfztpKCDCXGfCtIXs7gi7QU9KCAzH-k7g7N3ESarbc
    container_name: terminia-frontend
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3004
      - NODE_ENV=production
      - NEMOCLAW_API_URL=http://terminia-api:3100
      - NEXT_PUBLIC_SUPABASE_URL=https://supabase-terminia.pezserv.org
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpYXQiOjE3NzQ3NDA3NDAsImV4cCI6MTg5MzQ1NjAwMCwicm9sZSI6ImFub24iLCJpc3MiOiJzdXBhYmFzZSJ9.3rfztpKCDCXGfCtIXs7gi7QU9KCAzH-k7g7N3ESarbc
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3004/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  dokploy-network:
    external: true
