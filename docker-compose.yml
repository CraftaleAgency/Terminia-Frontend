services:
  terminia-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEMOCLAW_API_URL=http://terminia-api:3100
        - NEXT_PUBLIC_SUPABASE_URL=https://xtosmtpqkcdqnlxcmacc.supabase.co
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_FrKu4ZOVrtoZOA1KK2b_AQ_l9rQND3N
    container_name: terminia-frontend
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3004
      - NODE_ENV=production
      - NEMOCLAW_API_URL=http://terminia-api:3100
      - NEXT_PUBLIC_SUPABASE_URL=https://xtosmtpqkcdqnlxcmacc.supabase.co
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_FrKu4ZOVrtoZOA1KK2b_AQ_l9rQND3N
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3004/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  dokploy-network:
    external: true
